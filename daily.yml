name: 每日抓取期交所資料

on:
  schedule:
    # UTC 08:35 = 台灣時間 16:35（週一到週五）
    - cron: '35 8 * * 1-5'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 抓取期交所資料
        run: python fetch_taifex.py

      - name: 抓取現貨買賣超
        run: python fetch_stock_net.py

      - name: Commit 並 Push 資料
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: 更新 $(date +'%Y-%m-%d')"
          git push